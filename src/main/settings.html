<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      __SETTINGS_STYLE__
    </style>
  </head>
  <body>
    <div class="settings-root">
      <header class="settings-header">
        <h1>Konfiguration</h1>
      </header>

      <main class="content-scroll">
        <section class="settings-content">
          <label>
            Watchfolder
            <div class="path-row">
              <input id="watchFolder" placeholder="/path/to/watchfolder" />
              <button id="browseWatchFolder" type="button">Durchsuchen...</button>
            </div>
          </label>

          <label>
            Temporärer Exportordner
            <div class="path-row">
              <input id="tempExportFolder" placeholder="/path/to/temp" />
              <button id="browseTempFolder" type="button">Durchsuchen...</button>
            </div>
          </label>

        </section>
      </main>

      <footer class="actions-sticky">
        <button id="cancelButton" type="button">Abbrechen</button>
        <button id="saveButton" type="button" class="primary">Speichern</button>
      </footer>
    </div>

    <script>
      __SETTINGS_SCRIPT__
    </script>
  </body>
</html>
