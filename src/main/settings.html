<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        color: #1f2328;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f6f7f9;
        height: 100vh;
        overflow: hidden;
      }

      .settings-root {
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .content-scroll {
        flex: 1;
        overflow: auto;
        padding: 16px;
      }

      .section {
        max-width: 760px;
        margin: 0 auto;
        background: #ffffff;
        border: 1px solid #e1e4e9;
        border-radius: 12px;
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
      }

      p {
        margin: 0;
        color: #626b75;
        font-size: 13px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
      }

      input {
        border: 1px solid #c8ccd2;
        border-radius: 8px;
        background: #ffffff;
        color: #1f2328;
        padding: 8px 10px;
      }

      .path-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      .path-row button {
        min-width: 84px;
      }

      .actions-sticky {
        position: sticky;
        bottom: 0;
        background: #ffffff;
        border-top: 1px solid #e3e6ea;
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }

      button {
        border-radius: 8px;
        border: 1px solid #c8ccd2;
        background: #ffffff;
        color: #27303a;
        padding: 8px 12px;
        font-size: 13px;
      }

      .primary {
        border-color: #2f6fda;
        background: #2f6fda;
        color: #ffffff;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="settings-root">
      <main class="content-scroll">
        <section class="section">
          <h1>Konfiguration</h1>
          <label>
            Watchfolder
            <div class="path-row">
              <input id="watchFolder" placeholder="/path/to/watchfolder" />
              <button id="browseWatchFolder" type="button">Durchsuchen...</button>
            </div>
          </label>

          <label>
            Temporärer Exportordner
            <div class="path-row">
              <input id="tempExportFolder" placeholder="/path/to/temp" />
              <button id="browseTempFolder" type="button">Durchsuchen...</button>
            </div>
          </label>

          <label>
            Namensschema
            <input id="namingPreset" placeholder="{sourceName}" />
          </label>

        </section>
      </main>

      <footer class="actions-sticky">
        <button id="cancelButton" type="button">Abbrechen</button>
        <button id="saveButton" type="button" class="primary">Speichern</button>
      </footer>
    </div>

    <script>
      const watchFolderInput = document.getElementById('watchFolder')
      const tempExportFolderInput = document.getElementById('tempExportFolder')
      const browseWatchFolderButton = document.getElementById('browseWatchFolder')
      const browseTempFolderButton = document.getElementById('browseTempFolder')
      const namingPresetInput = document.getElementById('namingPreset')
      const saveButton = document.getElementById('saveButton')
      const cancelButton = document.getElementById('cancelButton')

      function readFormSettings() {
        return {
          watchFolder: watchFolderInput.value,
          tempExportFolder: tempExportFolderInput.value,
          namingPreset: namingPresetInput.value,
        }
      }

      function applyFormSettings(settings) {
        watchFolderInput.value = settings.watchFolder ?? ''
        tempExportFolderInput.value = settings.tempExportFolder ?? ''
        namingPresetInput.value = settings.namingPreset ?? '{sourceName}'
      }

      async function browseInto(inputElement) {
        try {
          const selectedPath = await window.eventPipe.pickDirectory(inputElement.value)
          if (selectedPath) {
            inputElement.value = selectedPath
          }
        } catch (error) {
          window.alert(error instanceof Error ? error.message : 'Ordnerauswahl fehlgeschlagen.')
        }
      }

      async function loadSettings() {
        try {
          const snapshot = await window.eventPipe.getSettings()
          applyFormSettings(snapshot.settings)
        } catch (error) {
          window.alert(error instanceof Error ? error.message : 'Konfiguration konnte nicht geladen werden.')
        }
      }

      async function saveSettings() {
        saveButton.disabled = true

        try {
          const snapshot = await window.eventPipe.saveSettings(readFormSettings())
          applyFormSettings(snapshot.settings)
          window.close()
        } catch (error) {
          window.alert(error instanceof Error ? error.message : 'Konfiguration konnte nicht gespeichert werden.')
        } finally {
          saveButton.disabled = false
        }
      }

      saveButton.addEventListener('click', () => {
        void saveSettings()
      })

      cancelButton.addEventListener('click', () => {
        window.close()
      })

      browseWatchFolderButton.addEventListener('click', () => {
        void browseInto(watchFolderInput)
      })

      browseTempFolderButton.addEventListener('click', () => {
        void browseInto(tempExportFolderInput)
      })

      void loadSettings()
    </script>
  </body>
</html>
