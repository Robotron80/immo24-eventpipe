<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        background: transparent;
      }

      .card {
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.96);
        border-radius: 16px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        color: #1f1f1f;
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.2);
      }

      .inner {
        text-align: center;
        display: grid;
        gap: 10px;
      }

      .pinwheel {
        width: 52px;
        height: 52px;
        margin: 0 auto 8px;
        animation: spin 4s linear infinite;
        object-fit: contain;
        display: block;
      }

      p {
        margin: 0;
        color: #6f7680;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 600;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="inner">
        <img class="pinwheel" src="__SPLASH_ICON_SRC__" alt="" aria-hidden="true" />
        <p>Ja, aber...</p>
        <h1>immo24 EventPipe</h1>
      </div>
    </div>
  </body>
</html>
